<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Do List</title>
  <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Itim&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Background ── */
    body {
      min-height: 100vh;
      background-color: #2e9e8c;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.18) 1.5px, transparent 1.5px),
        radial-gradient(circle, rgba(255,255,255,0.10) 1px,   transparent 1px);
      background-size: 36px 36px, 18px 18px;
      background-position: 0 0, 9px 9px;
      font-family: 'Itim', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    /* ── Input bar ── */
    .input-bar {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 680px;
      margin-bottom: 22px;
    }

    #taskInput {
      flex: 1;
      padding: 11px 20px;
      border-radius: 30px;
      border: none;
      font-family: 'Itim', cursive;
      font-size: 15px;
      color: #333;
      background: rgba(255,255,255,0.93);
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
      outline: none;
      transition: box-shadow 0.2s;
    }

    #taskInput:focus {
      box-shadow: 0 3px 14px rgba(0,0,0,0.25);
    }

    #taskInput::placeholder {
      color: #aaa;
    }

    .add-btn {
      padding: 11px 26px;
      border-radius: 30px;
      border: none;
      background: #b83232;
      color: #fff;
      font-family: 'Itim', cursive;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .add-btn:hover  { background: #d63c3c; }
    .add-btn:active { transform: scale(0.96); }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 680px;
      background: #fdf5e0;
      border-radius: 14px;
      padding: 38px 32px 44px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;

      /* Lined notebook paper */
      background-image:
        /* red margin line */
        linear-gradient(to right, transparent 54px, #f4a4a4 54px, #f4a4a4 56px, transparent 56px),
        /* horizontal rules – start below the header (~148px) */
        repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 34px,
          #cfc2a0 34px,
          #cfc2a0 35px
        );
      background-color: #fdf5e0;
      background-size: 100% 100%, 100% 35px;
      background-position: 0 0, 0 148px;
    }

    /* ── Decorative emojis ── */
    .deco {
      position: absolute;
      font-size: 24px;
      line-height: 1;
      user-select: none;
    }
    .deco-pin      { top: 14px; left:  18px; }
    .deco-candy    { top: 14px; right: 18px; }
    .deco-stocking { bottom: 14px; left: 18px; }

    /* ── Card header ── */
    .card-header {
      text-align: center;
      margin-bottom: 18px;
      padding-bottom: 6px;
    }

    .card-title {
      font-family: 'Sacramento', cursive;
      font-size: 62px;
      color: #c0392b;
      line-height: 1.1;
      letter-spacing: 1px;
    }

    .card-subtitle {
      font-family: 'Itim', cursive;
      font-size: 15px;
      color: #2471a3;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1.5px solid #d5c8a8;
      margin: 0 0 16px;
    }

    /* ── Tasks grid ── */
    .tasks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 24px;
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      color: #b8a888;
      font-size: 14px;
      padding: 24px 0 10px;
      font-style: italic;
    }

    /* ── Task item ── */
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 2px;
      min-height: 35px;
      border-bottom: 1px solid transparent; /* keeps height consistent */
      position: relative;
    }

    .task-item:hover .delete-btn {
      opacity: 1;
    }

    /* Circular checkbox */
    .task-check {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #2471a3;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 3px;
      transition: background 0.18s, border-color 0.18s;
    }

    .task-check.checked {
      background: #2471a3;
      border-color: #2471a3;
    }

    .task-check.checked::after {
      content: '✓';
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      line-height: 1;
    }

    /* Task text block */
    .task-body {
      flex: 1;
      min-width: 0;
    }

    .task-text {
      font-family: 'Itim', cursive;
      font-size: 14px;
      color: #1a5e8a;
      line-height: 1.35;
      word-break: break-word;
      transition: opacity 0.2s, text-decoration 0.2s;
    }

    .task-text.done {
      text-decoration: line-through;
      opacity: 0.4;
    }

    .task-ts {
      font-size: 10px;
      color: #b0a080;
      margin-top: 1px;
    }

    /* Delete button */
    .delete-btn {
      flex-shrink: 0;
      opacity: 0;
      background: none;
      border: none;
      color: #c0392b;
      font-size: 13px;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
      margin-top: 4px;
      transition: opacity 0.18s, color 0.18s;
      border-radius: 50%;
    }

    .delete-btn:hover {
      color: #922b21;
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      .tasks-grid {
        grid-template-columns: 1fr;
      }
      .card-title {
        font-size: 50px;
      }
      .card {
        padding: 34px 20px 40px;
      }
    }
  </style>
</head>
<body>

  <!-- Input bar -->
  <div class="input-bar">
    <input id="taskInput" type="text" placeholder="เพิ่มรายการ... / Add a task..." autocomplete="off" />
    <button class="add-btn" onclick="addTask()">Add</button>
  </div>

  <!-- Card -->
  <div class="card">
    <span class="deco deco-pin">📌</span>
    <span class="deco deco-candy">🍬</span>
    <span class="deco deco-stocking">🧦</span>

    <div class="card-header">
      <div class="card-title">To Do List</div>
      <div class="card-subtitle" id="subtitle"></div>
    </div>

    <hr class="divider" />

    <div class="tasks-grid" id="tasksGrid">
      <div class="empty-state">No tasks yet — add one above! 🎄</div>
    </div>
  </div>

  <script>
    /* ── Subtitle: current month + year ── */
    const MONTHS = [
      'January','February','March','April','May','June',
      'July','August','September','October','November','December'
    ];
    (function setSubtitle() {
      const d = new Date();
      document.getElementById('subtitle').textContent =
        MONTHS[d.getMonth()] + ' ' + d.getFullYear();
    })();

    /* ── Enter key ── */
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    /* ── State ── */
    let tasks = [];

    /* ── Helpers ── */
    function pad(n) { return String(n).padStart(2, '0'); }

    function formatTs(date) {
      return pad(date.getDate()) + '/' +
             pad(date.getMonth() + 1) + '/' +
             date.getFullYear() + ', ' +
             pad(date.getHours()) + ':' +
             pad(date.getMinutes());
    }

    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* ── Add task ── */
    function addTask() {
      const input = document.getElementById('taskInput');
      const text  = input.value.trim();
      if (!text) { input.focus(); return; }

      tasks.push({
        id:   Date.now(),
        text: text,
        done: false,
        ts:   formatTs(new Date())
      });
      input.value = '';
      input.focus();
      render();
    }

    /* ── Toggle done ── */
    function toggleTask(id) {
      const t = tasks.find(t => t.id === id);
      if (t) { t.done = !t.done; render(); }
    }

    /* ── Delete task ── */
    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    /* ── Render ── */
    function render() {
      const grid = document.getElementById('tasksGrid');

      if (tasks.length === 0) {
        grid.innerHTML = '<div class="empty-state">No tasks yet — add one above! 🎄</div>';
        return;
      }

      grid.innerHTML = tasks.map(t => `
        <div class="task-item">
          <div class="task-check${t.done ? ' checked' : ''}"
               onclick="toggleTask(${t.id})"
               title="${t.done ? 'Mark incomplete' : 'Mark complete'}"></div>
          <div class="task-body">
            <div class="task-text${t.done ? ' done' : ''}">${escHtml(t.text)}</div>
            <div class="task-ts">${t.ts}</div>
          </div>
          <button class="delete-btn"
                  onclick="deleteTask(${t.id})"
                  title="Remove task">✕</button>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
