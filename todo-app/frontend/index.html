<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Do List</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sacramento&family=Itim&family=Prompt:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Theme switcher (floating top-right) ── -->
  <div class="theme-switcher" id="themeSwitcher">
    <button
      class="theme-toggle-btn"
      id="themeToggleBtn"
      onclick="toggleThemeDropdown()"
      title="Switch theme"
      aria-label="Switch theme"
      aria-haspopup="true"
    >🎨</button>
    <div class="theme-dropdown" id="themeDropdown" role="menu">
      <button class="theme-option" data-theme="christmas" onclick="selectTheme('christmas')" role="menuitem">
        🎄 Christmas
      </button>
      <button class="theme-option" data-theme="songkran"  onclick="selectTheme('songkran')"  role="menuitem">
        🎉 Songkran
      </button>
    </div>
  </div>

  <!-- ── Error toast ── -->
  <div class="error-toast" id="errorToast" role="alert" aria-live="assertive"></div>

  <!-- ── Input bar ── -->
  <div class="input-bar">
    <input
      id="taskInput"
      type="text"
      placeholder="เพิ่มรายการ... / Add a task..."
      autocomplete="off"
    />
    <button class="add-btn" id="addBtn" onclick="addTask()">Add</button>
  </div>

  <!-- ── Card ── -->
  <div class="card">
    <span class="deco deco-top-left"     id="decoTopLeft"     aria-hidden="true"></span>
    <span class="deco deco-top-right"    id="decoTopRight"    aria-hidden="true"></span>
    <span class="deco deco-bottom-left"  id="decoBottomLeft"  aria-hidden="true"></span>
    <span class="deco deco-bottom-right" id="decoBottomRight" aria-hidden="true"></span>

    <div class="card-header">
      <div class="card-title">To Do List</div>
      <div class="card-subtitle" id="subtitle"></div>
    </div>

    <hr class="divider" />

    <!-- Meta row: counter + clear button -->
    <div class="task-meta">
      <span class="task-counter" id="taskCounter"></span>
      <button class="clear-btn" id="clearCompleted" onclick="clearCompleted()">
        Clear completed
      </button>
    </div>

    <!-- Filter tabs -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all"       onclick="setFilter('all')">All</button>
      <button class="filter-btn"        data-filter="active"     onclick="setFilter('active')">Active</button>
      <button class="filter-btn"        data-filter="completed"  onclick="setFilter('completed')">Completed</button>
    </div>

    <!-- Loading spinner -->
    <div class="spinner-wrap" id="spinnerWrap" aria-label="Loading tasks…">
      <div class="spinner-ring"></div>
    </div>

    <!-- Task grid -->
    <div class="tasks-grid" id="tasksGrid"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
