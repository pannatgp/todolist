<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Do List</title>
  <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Itim&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Error toast -->
  <div class="error-toast" id="errorToast" role="alert" aria-live="assertive"></div>

  <!-- Input bar -->
  <div class="input-bar">
    <input
      id="taskInput"
      type="text"
      placeholder="เพิ่มรายการ... / Add a task..."
      autocomplete="off"
    />
    <button class="add-btn" id="addBtn" onclick="addTask()">Add</button>
  </div>

  <!-- Card -->
  <div class="card">
    <span class="deco deco-pin"      aria-hidden="true">📌</span>
    <span class="deco deco-candy"    aria-hidden="true">🍬</span>
    <span class="deco deco-stocking" aria-hidden="true">🧦</span>

    <div class="card-header">
      <div class="card-title">To Do List</div>
      <div class="card-subtitle" id="subtitle"></div>
    </div>

    <hr class="divider" />

    <!-- Meta row: counter + clear button -->
    <div class="task-meta">
      <span class="task-counter" id="taskCounter"></span>
      <button class="clear-btn" id="clearCompleted" onclick="clearCompleted()">
        Clear completed
      </button>
    </div>

    <!-- Loading spinner -->
    <div class="spinner-wrap" id="spinnerWrap" aria-label="Loading tasks…">
      <div class="spinner-ring"></div>
    </div>

    <!-- Task grid -->
    <div class="tasks-grid" id="tasksGrid">
      <div class="empty-state">No tasks yet — add one above! 🎄</div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
